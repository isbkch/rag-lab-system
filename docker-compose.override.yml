# Development overrides for docker-compose.yml.

services:
  backend:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app:cached
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app:cached

  frontend:
    environment:
      - VITE_DEV_MODE=true
      - VITE_ENABLE_LOGGING=true
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    command: bun run dev -- --host 0.0.0.0

  mock-ai:
    volumes:
      - ./mock_ai:/app:cached
    command: uvicorn main:app --host 0.0.0.0 --port 9000 --reload
