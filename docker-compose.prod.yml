# Production-style overrides for the local failure lab.
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab_password}
      POSTGRES_DB: ${POSTGRES_DB:-failure_lab}

  redis:
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  chromadb:
    restart: always

  mock-ai:
    restart: always

  backend:
    restart: always
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MOCK_AI_URL=http://mock-ai:9000
      - DEPENDENCY_TIMEOUT_SECONDS=${DEPENDENCY_TIMEOUT_SECONDS:-0.5}
    command: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000

  celery-worker:
    restart: always
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MOCK_AI_URL=http://mock-ai:9000
      - DEPENDENCY_TIMEOUT_SECONDS=${DEPENDENCY_TIMEOUT_SECONDS:-0.5}
    command: celery -A app.celery_app:celery worker -Q lab --loglevel=info --concurrency=4

  frontend:
    restart: always
    environment:
      - VITE_API_BASE_URL=${FRONTEND_API_URL:-http://localhost:8080}
      - VITE_API_VERSION=v1
      - VITE_DEV_MODE=false
      - VITE_ENABLE_LOGGING=false

  prometheus:
    restart: always

  grafana:
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
