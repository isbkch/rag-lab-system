global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "failure-lab-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"

  - job_name: "mock-ai"
    static_configs:
      - targets: ["mock-ai:9000"]
    metrics_path: "/metrics"

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
